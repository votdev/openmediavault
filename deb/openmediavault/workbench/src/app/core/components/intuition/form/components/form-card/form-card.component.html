<div class="omv-display-flex omv-flex-1 omv-flex-column">
  <span *ngIf="config.label"
        class="mat-form-field-infix omv-color-secondary-text omv-font-size-smaller">
    {{ config.label }}
  </span>
  <mat-card class="omv-flex-1">
    <mat-card-content>
      <span class="omv-text-wrap" [innerHtml]="content | transloco | nl2br | sanitizeHtml"></span>
    </mat-card-content>
  </mat-card>
</div>
